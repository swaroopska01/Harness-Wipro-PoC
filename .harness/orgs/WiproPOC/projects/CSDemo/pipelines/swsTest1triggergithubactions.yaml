pipeline:
  name: sws-Test1-trigger-github-actions
  identifier: swsTest1triggergithubactions
  projectIdentifier: CSDemo
  orgIdentifier: WiproPOC
  description: Harness pipeline triggering the Github actions workflow
  tags: {}
  stages:
    - stage:
        name: Trigger_And_Track_GitHub_Workflow
        identifier: trigger_and_track
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  name: Trigger_And_Fetch_Run
                  identifier: trigger_and_fetch_run
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    environmentVariables:
                      - name: GITHUB_TOKEN
                        type: Secret
                        value: sws-harness-github3
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -e

                          OWNER="swaroopska01"
                          REPO="Harness-Wipro-PoC"
                          WORKFLOW_FILE="build.yml"

                          echo "🔹 Installing jq..."

                          if ! command -v jq &> /dev/null
                          then
                            echo "jq not found, installing..."
                            apt-get update -y && apt-get install -y jq
                          else
                            echo "jq already installed"
                          fi

                          echo "🔹 Triggering GitHub Actions workflow..."

                          TRIGGER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                            -X POST \
                            -H "Accept: application/vnd.github+json" \
                            -H "Authorization: Bearer $GITHUB_TOKEN" \
                            https://api.github.com/repos/$OWNER/$REPO/actions/workflows/$WORKFLOW_FILE/dispatches \
                            -d '{
                              "ref": "main",
                              "inputs": {
                                "environment": "dev",
                                "imageTag": "123"
                              }
                            }')

                          echo "Trigger HTTP Status: $TRIGGER_STATUS"

                          if [ "$TRIGGER_STATUS" -ne 204 ]; then
                            echo "❌ Failed to trigger workflow"
                            exit 1
                          fi

                          echo "✅ Workflow triggered successfully"

                          echo "⏳ Waiting for GitHub to register the run..."
                          sleep 5

                          echo "🔹 Fetching latest workflow run..."

                          RESPONSE=$(curl -s \
                            -H "Accept: application/vnd.github+json" \
                            -H "Authorization: Bearer $GITHUB_TOKEN" \
                            https://api.github.com/repos/$OWNER/$REPO/actions/runs?per_page=1)

                          RUN_NUMBER=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].run_number')
                          WORKFLOW_NAME=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].name')

                          if [ "$RUN_NUMBER" = "null" ] || [ -z "$RUN_NUMBER" ]; then
                            echo "❌ Failed to fetch run details"
                            echo "$RESPONSE"
                            exit 1
                          fi

                          echo "✅ GitHub Workflow Triggered:"
                          echo "$WORKFLOW_NAME #$RUN_NUMBER"
